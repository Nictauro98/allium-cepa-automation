services:

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ALLIUM_BUCKET: ${ALLIUM_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$ALLIUM_BUCKET &&
      echo 'Bucket ready.'
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --artifacts-destination s3://${ALLIUM_BUCKET}/mlflow
        --serve-artifacts
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      createbuckets:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ALLIUM_STORAGE: ${ALLIUM_STORAGE:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ALLIUM_BUCKET: ${ALLIUM_BUCKET}
    volumes:
      - allium_weights:/tmp/allium_weights
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 180s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "streamlit", "run", "src/ui/app.py",
              "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  airflow:
    image: apache/airflow:2.9.3-python3.12
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    environment:
      # Core
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme}
      # Provider switches (all default to mock — flip to real with secrets)
      ALLIUM_LABELING: ${ALLIUM_LABELING:-mock}
      ALLIUM_DRIVE: ${ALLIUM_DRIVE:-mock}
      ALLIUM_HUB: ${ALLIUM_HUB:-mock}
      ALLIUM_STORAGE: ${ALLIUM_STORAGE:-minio}
      ALLIUM_BUCKET: ${ALLIUM_BUCKET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Real provider secrets (all optional; mocks need none)
      ZOONIVERSE_USERNAME: ${ZOONIVERSE_USERNAME:-}
      ZOONIVERSE_PASSWORD: ${ZOONIVERSE_PASSWORD:-}
      ZOONIVERSE_PROJECT_ID: ${ZOONIVERSE_PROJECT_ID:-}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_DATASET_REPO: ${HF_DATASET_REPO:-}
      HF_SPACE_ID: ${HF_SPACE_ID:-}
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - airflow_db:/opt/airflow
    ports:
      - "8080:8080"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@example.com
          || true &&
        airflow webserver &
        airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

volumes:
  minio_data:
  mlflow_data:
  allium_weights:
  airflow_db:
