repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0  # run `pre-commit autoupdate` to get latest
    hooks:
      - id: ruff              # linter (with auto-fix)
        args: [--fix]
      - id: ruff-format       # formatter (replaces Black)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements    # catches leftover breakpoint() / pdb calls
      - id: check-added-large-files
        args: [--maxkb=500]     # block accidental commits of model weights/datasets
